name: Refresh US-listed holding prices

# Runs twice daily: 3:30 AM IST (22:00 UTC, ~2h after US markets close, so
# that day's close is settled) and 9:30 AM IST (04:00 UTC, shortly before
# NSE opens) as a redundancy check in case the first run failed. Both just
# refetch the same US close price when the earlier run already succeeded —
# the DB write is idempotent (upsert), so re-running is harmless.
#
# This runs via GitHub Actions rather than Vercel Cron because fetching
# ~169 quotes at Finnhub's free-tier rate limit (60/min) takes a few
# minutes, longer than Vercel's serverless function timeout allows (60s on
# Hobby), unlike the daily AUM snapshot which fits comfortably in Vercel Cron.
on:
  schedule:
    - cron: "0 22 * * *"
    - cron: "0 4 * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx tsx scripts/refresh-foreign-prices.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
